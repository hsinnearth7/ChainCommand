apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaincommand
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: chaincommand
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chaincommand
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaincommand
        app.kubernetes.io/version: "2.0.0"
    spec:
      containers:
        - name: chaincommand
          image: chaincommand:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chaincommand-config
            - secretRef:
                name: chaincommand-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
