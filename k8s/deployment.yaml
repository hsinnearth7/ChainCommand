# Production TODO: Add PodDisruptionBudget (minAvailable: 1) and
# podAntiAffinity (preferredDuringSchedulingIgnoredDuringExecution) to
# ensure high availability across nodes and controlled rolling updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaincommand
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: chaincommand
    app.kubernetes.io/version: "3.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chaincommand
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaincommand
        app.kubernetes.io/version: "3.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: chaincommand
          image: chaincommand:3.0.0
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: chaincommand-config
            - secretRef:
                name: chaincommand-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
