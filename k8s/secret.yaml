# WARNING: All values below are placeholders. You MUST replace them with
# real base64-encoded secrets before deploying (echo -n 'value' | base64).
#
# For production, use SealedSecrets (bitnami-labs/sealed-secrets) or
# ExternalSecrets (external-secrets.io) to avoid storing secrets in Git.
apiVersion: v1
kind: Secret
metadata:
  name: chaincommand-secret
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: chaincommand
type: Opaque
data:
  # REPLACE: echo -n 'your-api-key' | base64
  CC_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  # REPLACE: echo -n 'sk-...' | base64
  CC_OPENAI_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  # REPLACE: echo -n 'postgresql://user:pass@host:5432/db' | base64
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
  # REPLACE: echo -n 'redis://:pass@host:6379/0' | base64
  REDIS_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
  # REPLACE: echo -n 'your-postgres-password' | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE
