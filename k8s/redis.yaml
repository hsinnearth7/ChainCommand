apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: chaincommand
type: Opaque
# CHANGE_ME — replace the base64-encoded value with a strong password before deploying.
# Generate with: echo -n 'YOUR_STRONG_PASSWORD' | base64
data:
  redis-password: "Y2hhbmdlbWUtcmVkaXMtc2VjcmV0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: chaincommand
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: chaincommand
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - redis-server --requirepass "$(cat /etc/redis-secret/redis-password)"
          env:
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:
            - name: redis-secret-vol
              mountPath: /etc/redis-secret
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-secret-vol
          secret:
            secretName: redis-secret
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chaincommand
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: chaincommand
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: redis
