apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chaincommand.fullname" . }}-secret
  labels:
    {{- include "chaincommand.labels" . | nindent 4 }}
type: Opaque
data:
  CC_API_KEY: {{ .Values.secrets.apiKey | b64enc | quote }}
  # POSTGRES_PASSWORD: Set via .Values.postgresql.auth.password in values.yaml
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password must be set" .Values.postgresql.auth.password | b64enc | quote }}
